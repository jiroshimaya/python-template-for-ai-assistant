services:
  copilot:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        COPILOT_CLI_VERSION: "${COPILOT_CLI_VERSION:-latest}"
    image: fictional-scientists/copilot-workspace:local
    init: true
    stdin_open: true
    tty: true
    working_dir: /home/copilot/development
    command: ["sleep", "infinity"]
    environment:
      GH_TOKEN: "${GH_TOKEN:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      COPILOT_GITHUB_TOKEN: "${COPILOT_GITHUB_TOKEN:-}"
      COPILOT_HOST_GH_TOKEN: "${COPILOT_HOST_GH_TOKEN:-}"
      COPILOT_HOST_GH_GIT_PROTOCOL: "${COPILOT_HOST_GH_GIT_PROTOCOL:-https}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - type: volume
        source: copilot-development
        target: /home/copilot/development
      - type: volume
        source: copilot-gh-config
        target: /home/copilot/.config/gh
      - type: volume
        source: copilot-cli-config
        target: /home/copilot/.copilot

volumes:
  copilot-development:
  copilot-gh-config:
  copilot-cli-config:
